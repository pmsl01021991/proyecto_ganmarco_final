<section class="stats">

    <!-- INFORME -->
    <div class="stat-card">
        <i class="fa-solid fa-user-check"></i>

        <div>

            <h3>Informe</h3>

            <p>Detalles y Parámetros del Informe</p>

        </div>

    </div>


    <!-- DATA DEL INFORME -->
    <div class="dropdown-data">

        <div class="stat-card data-card" onclick="toggleDataMenu()">

            <i class="fa-solid fa-notes-medical"></i>

            <div class="data-texto">

                <h3>Data del Informe</h3>

                <p>Data de Muestras y Metadatos</p>

            </div>

            <i id="flechaData"
               class="fa-solid fa-chevron-down">
            </i>

        </div>

        <div id="menuData" class="menuDataFlotante">

            <button class="btnData"
                onclick="abrirArchivo('minerales')">

                Data de Minerales

            </button>

            <button class="btnData"
                onclick="abrirArchivo('igneas')">

                Data de Rocas Ígneas

            </button>

            <button class="btnData"
                onclick="abrirArchivo('metamorficas')">

                Data de Rocas Metamórficas

            </button>

            <button class="btnData"
                onclick="abrirArchivo('sedimentarias')">

                Data de Rocas Sedimentarias

            </button>

            <button class="btnData"
                onclick="abrirArchivo('alteraciones')">

                Data de Alteraciones

            </button>

        </div>

    </div>


    <!-- IA -->
    <div class="stat-card">

        <i class="fa-solid fa-robot"></i>

        <div>

            <h3>IA</h3>

            <p>Dictado y Análisis inteligente con GeoPilot IA</p>

        </div>

    </div>

</section>


<input type="file" id="minerales" hidden>
<input type="file" id="igneas" hidden>
<input type="file" id="metamorficas" hidden>
<input type="file" id="sedimentarias" hidden>
<input type="file" id="alteraciones" hidden>


<div class="card buscador">

    <h2>

        <i class="fa-solid fa-magnifying-glass"></i>

        Buscar Informe

    </h2>

    <div class="busqueda-box">

        <input
            type="text"
            id="dniBusqueda"
            placeholder="Ingrese el nombre del informe">

        <button id="btnBuscar">

            Buscar

        </button>

    </div>

</div>
